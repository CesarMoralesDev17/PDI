<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiniPS — Image Editor</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-logo">
      <span class="logo-icon">⬡</span>
      <span class="logo-text">MiniPS</span>
    </div>
    <div class="topbar-actions">
      <label class="btn btn-upload" for="fileInput">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Open Image
      </label>
      <input type="file" id="fileInput" accept="image/*" hidden />
      <button class="btn btn-primary" id="btnDownload">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export
      </button>
      <button class="btn btn-danger" id="btnReset">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.1"/></svg>
        Reset
      </button>
    </div>
  </header>

  <div class="app-body">

    <!-- LEFT PANEL -->
    <aside class="panel panel-left" id="leftPanel">
      <div class="panel-scroll">

        <!-- ADJUSTMENTS -->
        <section class="tool-group">
          <div class="group-header" data-toggle="adjustments">
            <span class="group-icon">◈</span> Adjustments
            <span class="collapse-arrow">▾</span>
          </div>
          <div class="group-body" id="adjustments">

            <div class="control-row">
              <label>Brightness</label>
              <input type="range" id="slBrightness" min="-150" max="150" value="0" class="slider" />
              <span class="val" id="valBrightness">0</span>
            </div>

            <div class="control-row">
              <label>Contrast</label>
              <input type="range" id="slContrast" min="-100" max="200" value="100" class="slider" />
              <span class="val" id="valContrast">1.00</span>
            </div>

            <div class="control-row">
              <label>R Channel</label>
              <input type="range" id="slRed" min="-128" max="128" value="0" class="slider slider-r" />
              <span class="val" id="valRed">0</span>
            </div>

            <div class="control-row">
              <label>G Channel</label>
              <input type="range" id="slGreen" min="-128" max="128" value="0" class="slider slider-g" />
              <span class="val" id="valGreen">0</span>
            </div>

            <div class="control-row">
              <label>B Channel</label>
              <input type="range" id="slBlue" min="-128" max="128" value="0" class="slider slider-b" />
              <span class="val" id="valBlue">0</span>
            </div>

            <div class="control-row">
              <label>Alpha (Opacity)</label>
              <input type="range" id="slAlpha" min="0" max="255" value="255" class="slider" />
              <span class="val" id="valAlpha">255</span>
            </div>

            <div class="control-row">
              <label>Gradient Overlay</label>
              <input type="range" id="slGradient" min="0" max="100" value="0" class="slider" />
              <span class="val" id="valGradient">0</span>
            </div>
            <div class="mini-row">
              <label class="mini-label">From</label>
              <input type="color" id="gradColor1" value="#ff0066" class="color-picker" />
              <label class="mini-label">To</label>
              <input type="color" id="gradColor2" value="#0066ff" class="color-picker" />
            </div>

            <button class="btn-apply" id="btnApplyAdjust">Apply Adjustments</button>
          </div>
        </section>

        <!-- TRANSFORM -->
        <section class="tool-group">
          <div class="group-header" data-toggle="transform">
            <span class="group-icon">⊕</span> Transform
            <span class="collapse-arrow">▾</span>
          </div>
          <div class="group-body" id="transform">

            <div class="control-row">
              <label>Rotation (°)</label>
              <input type="range" id="slRotation" min="-180" max="180" value="0" class="slider" />
              <span class="val" id="valRotation">0°</span>
            </div>

            <div class="control-row">
              <label>Scale (%)</label>
              <input type="range" id="slScale" min="10" max="300" value="100" class="slider" />
              <span class="val" id="valScale">100%</span>
            </div>

            <div class="mini-row">
              <label class="mini-label">Move X</label>
              <input type="number" id="moveX" value="0" class="num-input" />
              <label class="mini-label">Move Y</label>
              <input type="number" id="moveY" value="0" class="num-input" />
            </div>

            <button class="btn-apply" id="btnApplyTransform">Apply Transform</button>
          </div>
        </section>

      </div>
    </aside>

    <!-- CANVAS AREA -->
    <main class="canvas-area" id="canvasArea">
      <div class="canvas-wrapper" id="canvasWrapper">
        <div class="canvas-placeholder" id="canvasPlaceholder">
          <div class="placeholder-inner">
            <div class="placeholder-icon">⬡</div>
            <p>Open an image to begin editing</p>
            <label class="btn btn-upload-big" for="fileInput">Choose File</label>
          </div>
        </div>
        <canvas id="mainCanvas"></canvas>
      </div>
    </main>

    <!-- RIGHT PANEL -->
    <aside class="panel panel-right" id="rightPanel">
      <div class="panel-scroll">

        <!-- FREQUENCY FILTERS -->
        <section class="tool-group">
          <div class="group-header" data-toggle="freq">
            <span class="group-icon">〜</span> Frequency Filters
            <span class="collapse-arrow">▾</span>
          </div>
          <div class="group-body" id="freq">

            <div class="control-row">
              <label>Intensity</label>
              <input type="range" id="slFreqIntensity" min="1" max="10" value="1" class="slider" />
              <span class="val" id="valFreqIntensity">1</span>
            </div>

            <div class="filter-btn-grid">
              <button class="filter-btn" id="btnLowPass">Low-Pass</button>
              <button class="filter-btn" id="btnHighPass">High-Pass</button>
              <button class="filter-btn" id="btnBandPass">Band-Pass</button>
              <button class="filter-btn" id="btnNotch">Notch</button>
              <button class="filter-btn" id="btnEmboss">Emboss</button>
              <button class="filter-btn" id="btnEdge">Edge Det.</button>
            </div>

            <div class="control-row" style="margin-top:8px;">
              <label>Edge (Hough) Thr.</label>
              <input type="range" id="slHough" min="50" max="255" value="100" class="slider" />
              <span class="val" id="valHough">100</span>
            </div>
            <button class="filter-btn full" id="btnHough">Hough Edge</button>
          </div>
        </section>

        <!-- NOISE FILTERS -->
        <section class="tool-group">
          <div class="group-header" data-toggle="noise">
            <span class="group-icon">⁘</span> Noise &amp; Smoothing
            <span class="collapse-arrow">▾</span>
          </div>
          <div class="group-body" id="noise">

            <div class="control-row">
              <label>Intensity</label>
              <input type="range" id="slNoiseIntensity" min="1" max="100" value="25" class="slider" />
              <span class="val" id="valNoiseIntensity">25</span>
            </div>

            <div class="filter-btn-grid">
              <button class="filter-btn" id="btnGaussNoise">Gaussian</button>
              <button class="filter-btn" id="btnSaltPepper">Salt&amp;Pepper</button>
              <button class="filter-btn" id="btnBlur">Avg Blur</button>
              <button class="filter-btn" id="btnMedian">Median</button>
            </div>
          </div>
        </section>

        <!-- CUSTOM FILTERS -->
        <section class="tool-group">
          <div class="group-header" data-toggle="custom">
            <span class="group-icon">✦</span> Custom Filters
            <span class="collapse-arrow">▾</span>
          </div>
          <div class="group-body" id="custom">

            <p class="filter-label">Crystallize</p>
            <div class="control-row">
              <label>Block Size</label>
              <input type="range" id="slCrystallize" min="2" max="40" value="8" class="slider" />
              <span class="val" id="valCrystallize">8</span>
            </div>
            <button class="filter-btn full" id="btnCrystallize">Apply Crystallize</button>

            <p class="filter-label" style="margin-top:12px;">Vignette</p>
            <div class="control-row">
              <label>Strength</label>
              <input type="range" id="slVignette" min="0" max="100" value="50" class="slider" />
              <span class="val" id="valVignette">50</span>
            </div>
            <button class="filter-btn full" id="btnVignette">Apply Vignette</button>
          </div>
        </section>

      </div>
    </aside>

  </div>

  <!-- BOTTOM INFO BAR -->
  <footer class="infobar">
    <div class="info-grid">
      <div class="info-item">
        <span class="info-label">Size</span>
        <span class="info-val" id="infoDimensions">— × —</span>
      </div>
      <div class="info-item">
        <span class="info-label">Scale</span>
        <span class="info-val" id="infoScale">100%</span>
      </div>
      <div class="info-item">
        <span class="info-label">Format</span>
        <span class="info-val" id="infoFormat">—</span>
      </div>
      <div class="info-item">
        <span class="info-label">Est. Weight</span>
        <span class="info-val" id="infoWeight">—</span>
      </div>
      <div class="info-item">
        <span class="info-label">Filename</span>
        <input type="text" id="infoFilename" class="info-input" value="untitled" />
      </div>
      <div class="info-item">
        <span class="info-label">Output Format</span>
        <select id="infoOutFormat" class="info-select">
          <option value="image/png">PNG</option>
          <option value="image/jpeg">JPEG</option>
          <option value="image/webp">WebP</option>
        </select>
      </div>
      <div class="info-item">
        <span class="info-label">Quality</span>
        <input type="range" id="infoQuality" min="0.1" max="1" step="0.05" value="0.9" class="slider info-slider" />
        <span class="info-val" id="infoQualityVal">0.90</span>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
